# ローカル開発用 PostgreSQL + Adminer
# 本番 (AWS RDS) とバージョンを合わせる: PostgreSQL 16
#
# 起動: docker compose up -d
# 停止: docker compose down
# データリセット: docker compose down -v
#
# 接続情報:
#   postgres://vitanota:vitanota_local@localhost:5432/vitanota_dev
#   Adminer UI: http://localhost:8080

services:
  postgres:
    image: postgres:16-alpine
    container_name: vitanota-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vitanota
      POSTGRES_PASSWORD: vitanota_local
      POSTGRES_DB: vitanota_dev
      # パフォーマンス調整（ローカル開発用）
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --locale=C'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/local/init-databases.sh:/docker-entrypoint-initdb.d/00-init-databases.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vitanota -d vitanota_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  # DB 管理 UI (任意・ブラウザからテーブルを確認したい時に)
  adminer:
    image: adminer:latest
    container_name: vitanota-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: vitanota_postgres_data
