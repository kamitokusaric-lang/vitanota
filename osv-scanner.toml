# ── drizzle-orm 0.30.10 (direct) ───────────────────────────
# 0.30 系最終 patch で fix 済 CVE なし。0.31+ への minor upgrade で解消予定。
# vitanota のクエリは drizzle の型付き API (eq/and/sql 引数化) 中心、
# `sql.raw()` 等のユーザー入力を受ける unsafe API は未使用のため実効リスク低。

[[IgnoredVulns]]
id = "GHSA-gpj5-g38j-94v9"
reason = "drizzle-orm 0.30 系で fix なし。SQL Injection 系推定。vitanota は parameterized API のみ使用、sql.raw() 等 unsafe API を使う箇所なし (grep 確認済)。drizzle-orm 0.31+ minor upgrade で解消予定 (期限: 2026-06-30)"

