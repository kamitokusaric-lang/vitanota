# OSV-Scanner 設定ファイル
# 参考: https://google.github.io/osv-scanner/configuration/
#
# 方針:
# - MVP β 期間中は各 CVE の実効リスクを評価の上で allowlist
# - 期限 (2026-06-30) までに Next.js 15 major upgrade + drizzle-orm minor upgrade を実施
# - 各 ignore には必ず reason を明記し、監査証跡を残す
# - 詳細経緯: aidlc-docs/audit.md の「Phase C: OSV allowlist」エントリ、
#   post-mvp-backlog.md の「脆弱性対応 major upgrade」エントリ

# ── Next.js 14.2.35 (direct) ───────────────────────────────
# 14.2 系最終 patch で fix 済 CVE なし。15 系への major upgrade で解消予定。
# 多層防御 (CloudFront secret 強制化 + WAF rate limit + 招待制 + RLS + session 8h)
# で実効リスクを中弱に抑制中。

